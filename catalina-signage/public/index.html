<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catalina Landing</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600&family=Playfair+Display:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --gold: #c8a96e;
        --white: #f4f0ea;
        --dark: #080c10;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--dark);
        color: var(--white);
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 300;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .stage {
        position: fixed;
        inset: 0;
        overflow: hidden;
      }

      .slideshow {
        position: absolute;
        inset: 0;
        z-index: 0;
        background: var(--dark);
      }

      .slideshow__slide {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        opacity: 0;
        transition: opacity 1.6s ease-in-out;
        will-change: opacity;
      }

      .slideshow__slide.is-active {
        opacity: 1;
      }

      .slideshow__overlay {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background:
          linear-gradient(
            180deg,
            rgba(8, 12, 16, 0.78) 0%,
            rgba(8, 12, 16, 0.35) 28%,
            rgba(8, 12, 16, 0.35) 65%,
            rgba(8, 12, 16, 0.85) 100%
          ),
          radial-gradient(
            ellipse at center,
            rgba(8, 12, 16, 0) 40%,
            rgba(8, 12, 16, 0.55) 100%
          );
      }

      .hud {
        position: absolute;
        top: 2.5rem;
        z-index: 10;
        line-height: 1.1;
      }

      .hud--logo {
        left: 2.5rem;
        text-align: left;
      }

      .hud--clock {
        right: 2.5rem;
        text-align: right;
      }

      .logo__title {
        font-family: 'Playfair Display', serif;
        font-weight: 400;
        font-size: 2.4rem;
        letter-spacing: 0.04em;
        color: var(--white);
        margin: 0;
      }

      .logo__address {
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 300;
        font-size: 0.95rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--gold);
        margin: 0.5rem 0 0;
      }

      .clock__time {
        font-family: 'Playfair Display', serif;
        font-weight: 300;
        font-size: 2.4rem;
        letter-spacing: 0.05em;
        color: var(--white);
        margin: 0;
        font-variant-numeric: tabular-nums;
      }

      .clock__date {
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 400;
        font-size: 0.95rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--gold);
        margin: 0.5rem 0 0;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="slideshow" aria-hidden="true">
        <div class="slideshow__slide" id="slide-a"></div>
        <div class="slideshow__slide" id="slide-b"></div>
      </div>
      <div class="slideshow__overlay" aria-hidden="true"></div>

      <header class="hud hud--logo" aria-label="Property">
        <h1 class="logo__title">Catalina Landing</h1>
        <p class="logo__address">310 &ndash; 340 Golden Shore &middot; Long Beach</p>
      </header>

      <aside class="hud hud--clock" aria-label="Local time">
        <p class="clock__time" id="clock-time">--:--:--</p>
        <p class="clock__date" id="clock-date">&nbsp;</p>
      </aside>
    </div>

    <script>
      (function () {
        const BASE =
          'https://b3250884.smushcdn.com/3250884/wp-content/uploads/2026/03/';
        const SUFFIX = '?lossy=2&strip=1&webp=1';
        const SLIDE_MS = 8000;

        const range = (start, end) => {
          const out = [];
          for (let i = start; i <= end; i++) out.push(i);
          return out;
        };
        const pad2 = (n) => String(n).padStart(2, '0');

        const exteriors = [
          'TheWaterfrontAtCatalinaLanding_Exterior-00.jpg',
          ...range(1, 15).map((n) => `Exteriors-${n}.jpg`),
        ];
        const patios = [
          ...range(1, 15).map(
            (n) => `TheWaterfrontAtCatalinaLanding_Patio-${pad2(n)}.jpg`
          ),
          'TheWaterfrontAtCatalinaLanding_Patio-17.jpg',
        ];
        const seaLevel = [
          ...range(1, 4).map(
            (n) => `TheWaterfrontAtCatalinaLanding_SeaFloor-${n}.jpg`
          ),
          'TheWaterfrontAtCatalinaLanding_SeaFloor-6.jpg',
          ...range(8, 10).map(
            (n) => `TheWaterfrontAtCatalinaLanding_SeaFloor-${n}.jpg`
          ),
        ];

        const images = [...exteriors, ...patios, ...seaLevel].map(
          (name) => BASE + name + SUFFIX
        );

        const slides = [
          document.getElementById('slide-a'),
          document.getElementById('slide-b'),
        ];

        let index = 0;
        let active = 0;

        function showSlide(url, layer) {
          const img = new Image();
          img.onload = () => {
            slides[layer].style.backgroundImage = `url("${url}")`;
            slides[layer].classList.add('is-active');
            slides[1 - layer].classList.remove('is-active');
          };
          img.onerror = () => {
            advance();
          };
          img.src = url;
        }

        function advance() {
          const url = images[index % images.length];
          index++;
          active = 1 - active;
          showSlide(url, active);
        }

        if (images.length > 0) {
          showSlide(images[0], active);
          index = 1;
          setInterval(advance, SLIDE_MS);
        }
      })();

      (function () {
        const timeEl = document.getElementById('clock-time');
        const dateEl = document.getElementById('clock-date');

        const timeFmt = new Intl.DateTimeFormat('en-US', {
          hour: 'numeric',
          minute: '2-digit',
          second: '2-digit',
          hour12: true,
        });

        const dateFmt = new Intl.DateTimeFormat('en-US', {
          weekday: 'long',
          month: 'long',
          day: 'numeric',
          year: 'numeric',
        });

        function tick() {
          const now = new Date();
          timeEl.textContent = timeFmt.format(now);
          dateEl.textContent = dateFmt.format(now);
        }

        tick();
        setInterval(tick, 1000);
      })();
    </script>
  </body>
</html>
